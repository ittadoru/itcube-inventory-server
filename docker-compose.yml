services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: itcube_inventory
      POSTGRES_USER: itcube
      POSTGRES_PASSWORD: itcube
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  pg_data:
