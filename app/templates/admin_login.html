<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IT Cube Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    :root {
      --panel: rgba(14, 20, 32, 0.84);
      --line: rgba(255, 255, 255, 0.08);
      --accent: #2ea8ff;
    }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 12% 12%, rgba(46, 168, 255, 0.22), transparent 30%),
        radial-gradient(circle at 88% 88%, rgba(0, 214, 153, 0.18), transparent 30%),
        linear-gradient(135deg, #090e18, #0f1629 50%, #0c1220);
      font-family: "Segoe UI", "Inter", sans-serif;
    }
    .auth-card {
      width: min(460px, 92vw);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 20px 55px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
      animation: fadeUp .5s ease both;
    }
    .brand-chip {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 6px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: .82rem;
      color: #b7c6df;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 14px rgba(46, 168, 255, .85);
    }
    .btn-primary {
      background: linear-gradient(135deg, #2498ff, #2bc2ff);
      border: none;
      font-weight: 600;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="auth-card p-4 p-md-5">
    <div class="brand-chip mb-3"><span class="dot"></span> IT Cube Inventory · Admin</div>
    <h1 class="h3 mb-2">Вход администратора</h1>
    <p class="text-secondary mb-4">Введите пароль для доступа к панели управления.</p>

    {% if error %}
      <div class="alert alert-danger py-2" role="alert">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/login" class="d-grid gap-3">
      <div>
        <label class="form-label text-secondary">Пароль</label>
        <input type="password" class="form-control form-control-lg" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary btn-lg">Войти</button>
    </form>
  </div>
</body>
</html>
